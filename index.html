<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVIATOR MZ PRO — Motor Quântico V3</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --r1:#FF0022;--r2:#FF4500;--r3:#8B0000;
  --dark:#05000A;--dark2:#0D0018;
  --card:rgba(255,0,34,0.07);--card2:rgba(255,0,34,0.14);
  --border:rgba(255,0,34,0.2);--border2:rgba(255,0,34,0.45);
  --gold:#FFD700;--green:#00E676;--cyan:#00BCD4;
  --text:#FFE8EC;--muted:#B07080;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 90% 50% at 50% -10%,rgba(255,0,34,0.13),transparent 65%),
  radial-gradient(ellipse 60% 40% at 100% 100%,rgba(139,0,0,0.1),transparent 60%);}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(5,0,10,0.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;letter-spacing:2px;display:flex;align-items:center;gap:8px;}
.logo em{background:linear-gradient(135deg,var(--r1),var(--r2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.badge-live{display:flex;align-items:center;gap:5px;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.35);padding:4px 11px;border-radius:50px;font-size:.72rem;font-weight:700;color:#00E676;letter-spacing:1px;}
.dot-live{width:6px;height:6px;border-radius:50%;background:#00E676;animation:pg 1.2s infinite;}
@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.7);}50%{box-shadow:0 0 0 5px rgba(0,230,118,0);}}

/* PAGES */
.page{display:none;position:relative;z-index:1;}
.page.active{display:block;}

/* ═══════════ PAGE 1 — LANDING ═══════════ */
.hero{text-align:center;padding:50px 18px 32px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 70% at 50% 0%,rgba(255,0,34,0.09),transparent);}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,0,34,0.14);border:1px solid var(--border2);color:var(--r1);padding:5px 15px;border-radius:50px;font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;animation:fd .5s ease;}
@keyframes fd{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:none;}}
.hero h1{font-family:'Orbitron',monospace;font-size:1.9rem;font-weight:900;line-height:1.2;margin-bottom:14px;animation:fd .6s ease;}
.hero h1 span{background:linear-gradient(135deg,var(--r1),var(--r2),#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(255,0,34,.5));}
.hero-sub{font-size:1rem;color:var(--muted);max-width:340px;margin:0 auto 24px;line-height:1.7;animation:fd .7s ease;}
.hero-sub strong{color:var(--text);}
.proof-bar{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:26px;}
.pc{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,.2);color:var(--gold);padding:5px 12px;border-radius:50px;font-size:.78rem;font-weight:700;white-space:nowrap;}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:380px;margin:0 auto 28px;}
.hstat{background:var(--card2);border:1px solid var(--border2);border-radius:18px;padding:16px 8px;text-align:center;position:relative;overflow:hidden;}
.hstat::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,0,34,.1),transparent 70%);}
.hstat-n{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,#fff,var(--r1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hstat-l{font-size:.7rem;color:var(--muted);margin-top:4px;}

.sec{padding:0 16px 32px;max-width:480px;margin:0 auto;}
.sh{text-align:center;margin-bottom:18px;}
.sh h2{font-family:'Orbitron',monospace;font-size:1.15rem;font-weight:700;letter-spacing:1.5px;margin-bottom:5px;}
.sh p{color:var(--muted);font-size:.88rem;line-height:1.6;}
.rl{width:40px;height:3px;margin:8px auto 0;background:linear-gradient(90deg,var(--r1),var(--r2));border-radius:50px;}

/* URGENCY */
.urgency{margin:0 auto 26px;max-width:480px;padding:0 16px;position:relative;z-index:1;}
.urg-inner{background:linear-gradient(135deg,rgba(255,0,34,.18),rgba(255,69,0,.1));border:1px solid var(--border2);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.urg-icon{font-size:1.8rem;animation:sk 2s infinite;flex-shrink:0;}
@keyframes sk{0%,100%{transform:rotate(0);}15%{transform:rotate(-8deg);}30%{transform:rotate(8deg);}45%{transform:rotate(0);}}
.urg-text{font-size:.86rem;line-height:1.6;}
.urg-text strong{color:var(--r1);font-family:'Orbitron',monospace;}

/* TICKER */
.ticker-wrap{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:9px 0;background:rgba(255,0,34,.04);margin-bottom:0;}
.ticker-track{display:flex;gap:14px;animation:tk 28s linear infinite;width:max-content;}
@keyframes tk{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.tc{flex-shrink:0;display:flex;align-items:center;gap:6px;background:rgba(0,230,118,.09);border:1px solid rgba(0,230,118,.22);padding:5px 13px;border-radius:50px;font-size:.8rem;font-weight:700;color:#00E676;white-space:nowrap;}
.tc .tm{font-family:'Orbitron',monospace;font-size:.82rem;color:#fff;}

/* WINS GRID */
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.wcard{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:13px 11px;position:relative;overflow:hidden;}
.wcard::after{content:'';position:absolute;top:-15px;right:-15px;width:50px;height:50px;border-radius:50%;background:radial-gradient(circle,rgba(0,230,118,.12),transparent);}
.wm{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;color:var(--gold);line-height:1;margin-bottom:2px;}
.wp{font-size:.74rem;color:var(--muted);}
.wc{font-size:.8rem;font-weight:700;color:var(--green);}
.wt{font-size:.7rem;color:var(--muted);margin-top:1px;}
.wb{position:absolute;top:8px;right:8px;background:rgba(0,230,118,.15);border:1px solid rgba(0,230,118,.25);color:var(--green);font-size:.67rem;font-weight:700;padding:2px 6px;border-radius:50px;}

/* TESTIMONIALS */
.tlist{display:flex;flex-direction:column;gap:11px;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;position:relative;overflow:hidden;}
.tcard::after{content:'❝';position:absolute;bottom:-12px;right:12px;font-size:3.5rem;color:rgba(255,0,34,.07);line-height:1;}
.tcard-stars{color:var(--gold);font-size:.86rem;margin-bottom:7px;}
.tcard-text{font-size:.91rem;line-height:1.7;margin-bottom:13px;}
.tcard-foot{display:flex;align-items:center;gap:9px;}
.tcard-av{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--r3),var(--r2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem;border:2px solid var(--border2);}
.tcard-name{font-weight:700;font-size:.9rem;}
.tcard-info{font-size:.72rem;color:var(--muted);margin-top:1px;}
.tcard-earned{margin-left:auto;flex-shrink:0;background:rgba(0,230,118,.09);border:1px solid rgba(0,230,118,.2);color:var(--green);padding:4px 9px;border-radius:9px;font-family:'Orbitron',monospace;font-size:.76rem;font-weight:700;}

/* FEATURES */
.feats{display:flex;flex-direction:column;gap:9px;}
.feat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;gap:12px;align-items:flex-start;}
.feat-ic{width:44px;height:44px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:var(--card2);border:1px solid var(--border2);}
.feat-title{font-size:.94rem;font-weight:700;margin-bottom:4px;color:#fff;}
.feat-desc{font-size:.82rem;color:var(--muted);line-height:1.6;}

/* COMPARISON */
.cmp{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
.cmp-h{display:grid;grid-template-columns:1fr 1fr 1fr;padding:11px 13px;border-bottom:1px solid var(--border);font-size:.73rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.cmp-h .ours{color:var(--r1);font-family:'Orbitron',monospace;}
.cmp-r{display:grid;grid-template-columns:1fr 1fr 1fr;padding:10px 13px;border-bottom:1px solid rgba(255,0,34,.07);font-size:.81rem;align-items:center;}
.cmp-r:last-child{border-bottom:none;}
.cmp-r .fn{color:var(--muted);}
.cmp-r .yes{color:var(--green);font-weight:700;text-align:center;}
.cmp-r .no{color:#444;text-align:center;}
.cmp-r .ov{color:var(--r1);font-weight:700;text-align:center;}

/* STEPS */
.steps{display:flex;flex-direction:column;}
.step{display:flex;gap:14px;padding-bottom:22px;position:relative;}
.step:not(:last-child)::before{content:'';position:absolute;left:17px;top:36px;bottom:0;width:2px;background:linear-gradient(to bottom,var(--r1),transparent);}
.step-n{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--r1),var(--r2));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:.85rem;box-shadow:0 0 16px rgba(255,0,34,.4);}
.step-title{font-size:.95rem;font-weight:700;margin-bottom:3px;}
.step-desc{font-size:.84rem;color:var(--muted);line-height:1.6;}

/* GATE */
.gate-wrap{margin:0 auto;max-width:480px;padding:0 16px;position:relative;z-index:1;}
.gate-card{background:linear-gradient(135deg,rgba(255,0,34,.12),rgba(139,0,0,.08));border:2px solid var(--r1);border-radius:22px;padding:26px 18px;text-align:center;box-shadow:0 0 50px rgba(255,0,34,.16);position:relative;overflow:hidden;}
.gate-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,0,34,.09),transparent 60%);}
.gate-title{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;margin-bottom:7px;position:relative;}
.gate-sub{font-size:.88rem;color:var(--muted);margin-bottom:20px;line-height:1.7;position:relative;}
.gate-sub strong{color:var(--text);}
.gate-feats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px;position:relative;}
.gf{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:9px;padding:7px 9px;font-size:.78rem;display:flex;align-items:center;gap:5px;}
.gate-input{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--border2);border-radius:13px;color:#fff;font-family:'Orbitron',monospace;font-size:1rem;padding:15px 16px;letter-spacing:4px;text-align:center;outline:none;margin-bottom:11px;position:relative;z-index:1;transition:border-color .3s;}
.gate-input:focus{border-color:var(--r1);box-shadow:0 0 18px rgba(255,0,34,.18);}
.gate-input::placeholder{letter-spacing:2px;font-size:.8rem;color:var(--muted);}
.gate-input.err{border-color:#FF4444;animation:sh .4s ease;}
@keyframes sh{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
.gate-error{color:#FF5555;font-size:.82rem;margin-bottom:9px;display:none;font-weight:600;position:relative;}
.btn-access{width:100%;background:linear-gradient(135deg,var(--r1),var(--r2));border:none;border-radius:14px;color:#fff;font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;padding:17px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 28px rgba(255,0,34,.45);transition:all .3s;position:relative;z-index:1;}
.btn-access:hover{transform:translateY(-2px);box-shadow:0 8px 38px rgba(255,0,34,.65);}
.gate-note{font-size:.76rem;color:var(--muted);margin-top:12px;position:relative;}
.gate-note a{color:var(--r1);font-weight:700;text-decoration:none;}

.cta-wa{padding:34px 16px;text-align:center;position:relative;z-index:1;}
.cta-wa h2{font-family:'Orbitron',monospace;font-size:1.15rem;font-weight:900;margin-bottom:9px;}
.cta-wa p{color:var(--muted);font-size:.9rem;margin-bottom:18px;line-height:1.6;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;max-width:380px;margin:0 auto 10px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;text-decoration:none;font-family:'Orbitron',monospace;font-weight:700;font-size:.86rem;letter-spacing:1px;padding:17px;border-radius:15px;text-align:center;box-shadow:0 4px 28px rgba(37,211,102,.28);transition:all .3s;}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 8px 38px rgba(37,211,102,.45);}
.guarantee{display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.17);padding:9px 15px;border-radius:50px;font-size:.78rem;color:var(--gold);font-weight:600;}

/* ═══════════ PAGE 2 — SUPER BOT ═══════════ */
.bot-hdr{text-align:center;padding:26px 16px 16px;position:relative;z-index:1;}
.bot-hdr h2{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,#fff,var(--r1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.bot-hdr p{color:var(--muted);font-size:.84rem;}
.bot-wrap{max-width:480px;margin:0 auto;padding:0 14px 40px;position:relative;z-index:1;}

.plat-lbl{font-size:.74rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;font-weight:700;}
.plat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.plat-btn{background:rgba(255,0,34,.06);border:1px solid var(--border);color:var(--text);border-radius:11px;padding:9px 5px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;text-align:center;transition:all .2s;}
.plat-btn .pd{width:5px;height:5px;border-radius:50%;background:var(--green);margin:0 auto 3px;box-shadow:0 0 4px var(--green);}
.plat-btn.active,.plat-btn:hover{background:rgba(255,0,34,.2);border-color:var(--r1);color:#fff;box-shadow:0 0 12px rgba(255,0,34,.2);}

/* NEURAL ANALYSIS CARD */
.neural-card{border-radius:22px;padding:22px;margin-bottom:13px;text-align:center;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(255,0,34,.09),rgba(139,0,0,.05));border:1px solid var(--border2);}
.neural-card::before{content:'';position:absolute;inset:0;background:conic-gradient(from 0deg at 50% 50%,transparent,rgba(255,0,34,.04),transparent);animation:rot 12s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.nc-lbl{font-size:.68rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;font-weight:700;position:relative;}
.nc-val{font-family:'Orbitron',monospace;font-size:3.8rem;font-weight:900;line-height:1;position:relative;transition:all .4s;background:linear-gradient(135deg,var(--gold),var(--r2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 22px rgba(255,140,0,.45));}
.nc-val.idle{background:linear-gradient(135deg,#2a2a2a,#444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:none;}
.nc-val.loading{background:linear-gradient(135deg,var(--r3),var(--r1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:bl .45s infinite;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:.25;}}
.nc-sub{font-size:.9rem;color:var(--muted);margin-top:9px;position:relative;}
.nc-conf{display:inline-block;margin-top:10px;position:relative;padding:5px 15px;border-radius:50px;font-size:.82rem;font-weight:700;}
.nc-conf.hi{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.28);color:var(--green);}
.nc-conf.md{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.22);color:var(--gold);}
.nc-conf.lo{background:rgba(255,0,34,.12);border-color:rgba(255,0,34,.25);color:var(--r1);}

/* NEURAL NET VISUALIZER */
.neural-net{display:none;margin-top:16px;position:relative;}
.nn-title{font-size:.68rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.nn-layers{display:flex;justify-content:space-around;align-items:center;height:80px;position:relative;}
.nn-layer{display:flex;flex-direction:column;justify-content:space-around;height:100%;}
.nn-node{width:12px;height:12px;border-radius:50%;border:2px solid var(--r1);transition:all .3s;position:relative;}
.nn-node.active{background:var(--r1);box-shadow:0 0 8px var(--r1);}
.nn-node.fired{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px var(--gold);animation:fire .3s ease;}
@keyframes fire{0%{transform:scale(1);}50%{transform:scale(1.6);}100%{transform:scale(1);}}
.nn-connections{position:absolute;inset:0;pointer-events:none;}

/* ALGO METERS */
.algo-panel{display:none;margin-top:14px;display:none;}
.algo-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.algo-meter{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:10px;padding:9px 10px;}
.algo-name{font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-weight:700;}
.algo-bar-wrap{height:4px;background:rgba(255,255,255,.07);border-radius:50px;overflow:hidden;}
.algo-bar-fill{height:100%;border-radius:50px;width:0%;transition:width .25s;}
.algo-bar-fill.fib{background:linear-gradient(90deg,var(--r3),var(--r1));}
.algo-bar-fill.str{background:linear-gradient(90deg,#7C3AED,var(--r1));}
.algo-bar-fill.qnt{background:linear-gradient(90deg,var(--gold),var(--r2));}
.algo-bar-fill.pat{background:linear-gradient(90deg,var(--green),var(--cyan));}
.algo-bar-fill.rsi{background:linear-gradient(90deg,var(--cyan),#7C3AED);}
.algo-bar-fill.bol{background:linear-gradient(90deg,#FF69B4,var(--r1));}
.algo-val{font-size:.68rem;color:var(--gold);margin-top:3px;font-family:'Orbitron',monospace;}

/* NUMBER STREAM */
.num-stream{background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:9px;padding:7px 10px;font-family:'Orbitron',monospace;font-size:.58rem;color:rgba(255,0,34,.5);letter-spacing:.5px;overflow:hidden;height:24px;margin-top:10px;display:none;}

/* PROGRESS */
.prog-wrap{margin-bottom:12px;display:none;}
.prog-bar-outer{height:6px;background:rgba(255,255,255,.07);border-radius:50px;overflow:hidden;position:relative;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--r3),var(--r1),var(--r2),var(--gold));background-size:200% 100%;border-radius:50px;width:0%;transition:width .08s linear;box-shadow:0 0 10px rgba(255,0,34,.4);animation:pgm 2s linear infinite;}
@keyframes pgm{0%{background-position:0%;}100%{background-position:200%;}}
.prog-info{display:flex;justify-content:space-between;font-size:.74rem;color:var(--muted);margin-top:5px;}
.prog-phase{font-size:.7rem;color:var(--r1);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:1px;}

/* RESULT DETAIL */
.result-detail{display:none;margin-bottom:13px;}
.rd-inner{background:var(--card2);border:1px solid var(--border2);border-radius:16px;padding:14px;}
.rd-title{font-size:.72rem;color:var(--r1);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:11px;}
.rd-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.rd-item{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:9px;padding:9px;text-align:center;}
.rd-item-lbl{font-size:.64rem;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:1px;}
.rd-item-val{font-weight:700;font-size:.88rem;}
/* Candlestick mini chart */
.candle-chart{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:10px;}
.candle-title{font-size:.64rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.candles{dis
